<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Bright glowing filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Ultra-bright linear gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#66fcf1" />
      <stop offset="100%" stop-color="#3cc2bc" />
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0b0ff" />
      <stop offset="100%" stop-color="#ab47bc" />
    </linearGradient>

    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Background Card 1 (Rotated Left) - Brightened -->
  <rect x="120" y="100" width="240" height="240" rx="24" transform="rotate(-12 240 220)" fill="url(#purpleGrad)" opacity="0.65" filter="url(#glow)" />
  <rect x="120" y="100" width="240" height="240" rx="24" transform="rotate(-12 240 220)" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.3" />

  <!-- Background Card 2 (Rotated Right) - High visibility Glass -->
  <rect x="150" y="120" width="240" height="240" rx="24" transform="rotate(8 270 240)" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="3" opacity="0.8" />
  
  <!-- Image content inside Card 2 - Brightened -->
  <g transform="rotate(8 270 240)">
    <!-- Glowing Sun -->
    <circle cx="320" cy="180" r="28" fill="#66fcf1" opacity="0.95" filter="url(#glow)" />
    <!-- Mountains -->
    <path d="M170 320 L240 230 L290 280 L350 200 L410 320 Z" fill="rgba(255, 255, 255, 0.15)" stroke="#ffffff" stroke-width="2" opacity="0.7" />
  </g>

  <!-- The Glider - Solid bright neon cyan -->
  <g filter="url(#glow)">
    <path d="M120 380 L380 200 L280 400 L250 310 Z" fill="url(#cyanGrad)" />
    <path d="M380 200 L250 310 L280 400 Z" fill="rgba(0, 0, 0, 0.15)" />
    <path d="M120 380 L380 200 L250 310 Z" fill="rgba(255, 255, 255, 0.25)" />
  </g>
</svg>
