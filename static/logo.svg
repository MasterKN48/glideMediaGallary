<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Linear Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66fcf1" />
      <stop offset="100%" stop-color="#45a29e" />
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a83af0" />
      <stop offset="100%" stop-color="#6f22d2" />
    </linearGradient>

    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Background Card 1 (Rotated Left) -->
  <rect x="120" y="100" width="240" height="240" rx="24" transform="rotate(-12 240 220)" fill="url(#purpleGrad)" opacity="0.4" filter="url(#glow)" />

  <!-- Background Card 2 (Rotated Right) -->
  <rect x="150" y="120" width="240" height="240" rx="24" transform="rotate(8 270 240)" fill="url(#glassGrad)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" />
  
  <!-- Image content inside Card 2 -->
  <g transform="rotate(8 270 240)">
    <!-- Sun -->
    <circle cx="320" cy="180" r="28" fill="#66fcf1" opacity="0.8" filter="url(#glow)" />
    <!-- Mountains -->
    <path d="M170 320 L240 230 L290 280 L350 200 L410 320 Z" fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" />
  </g>

  <!-- The Glider -->
  <g filter="url(#glow)">
    <path d="M120 380 L380 200 L280 400 L250 310 Z" fill="url(#cyanGrad)" />
    <path d="M380 200 L250 310 L280 400 Z" fill="rgba(0, 0, 0, 0.2)" />
    <path d="M120 380 L380 200 L250 310 Z" fill="rgba(255, 255, 255, 0.1)" />
  </g>
</svg>
